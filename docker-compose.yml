services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: redis://redis:6379
      CRM_SERVICE_URL: http://host.docker.internal:3003
      ONBOARDING_SERVICE_URL: http://host.docker.internal:3002
      DATA_ROOM_SERVICE_URL: http://host.docker.internal:3001
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
